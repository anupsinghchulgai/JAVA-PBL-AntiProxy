<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anti-Proxy Attendance System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #0b0f1a;
        --bg2:       #111827;
        --bg3:       #1a2235;
        --card:      #151d2e;
        --border:    #1e2d45;
        --accent:    #4f8ef7;
        --accent2:   #7c5af7;
        --green:     #22d3a5;
        --red:       #f75a5a;
        --amber:     #f7b955;
        --text:      #e8edf5;
        --text2:     #8b9ab5;
        --text3:     #4a5a74;
        --radius:    14px;
        --shadow:    0 4px 32px rgba(0,0,0,0.45);
      }

      html, body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: 'Sora', sans-serif;
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      #root { min-height: 100vh; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg2); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

      /* Global utilities used across components */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      input[type="text"], input[type="email"] {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: 'Sora', sans-serif;
        font-size: 14px;
        padding: 12px 16px;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type="text"]:focus, input[type="email"]:focus {
        border-color: var(--accent);
      }
      input::placeholder { color: var(--text3); }

      button {
        font-family: 'Sora', sans-serif;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 24px;
        transition: all 0.18s;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        width: 100%;
      }
      .btn-primary:not(:disabled):hover { opacity: 0.88; transform: translateY(-1px); }

      .btn-danger {
        background: rgba(247,90,90,0.12);
        color: var(--red);
        border: 1px solid rgba(247,90,90,0.3);
        width: 100%;
        margin-top: 12px;
      }
      .btn-danger:hover { background: rgba(247,90,90,0.2); }

      .btn-secondary {
        background: var(--bg3);
        color: var(--text2);
        border: 1px solid var(--border);
        width: 100%;
        margin-top: 8px;
      }
      .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

      .error-box {
        background: rgba(247,90,90,0.1);
        border: 1px solid rgba(247,90,90,0.3);
        color: #f99;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        margin: 12px 0;
        line-height: 1.5;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .form-group { margin-bottom: 16px; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes slideIn {
        from { transform: translateX(110%); opacity: 0; }
        to   { transform: translateX(0);   opacity: 1; }
      }

      .spinner {
        width: 40px; height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
